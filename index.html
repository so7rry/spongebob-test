<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧽 测测你是海绵宝宝里的谁</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --yellow: #FCE029;
  --blue: #2B9BD2;
  --pink: #FF69B4;
  --dark: #1a1a2e;
  --light: #FFF8E7;
  --gold: #FFD700;
  --coral: #FF6B6B;
}

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--dark);
  min-height: 100vh;
  overflow-x: hidden;
  color: #fff;
}

/* ===== BUBBLE BACKGROUND ===== */
.bubble-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.bubble {
  position: absolute;
  bottom: -100px;
  background: rgba(255,255,255,0.05);
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
  animation: rise linear infinite;
}
@keyframes rise {
  0% { transform: translateY(0) scale(1); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.3; }
  100% { transform: translateY(-110vh) scale(0.8); opacity: 0; }
}

/* ===== SCREENS ===== */
.screen {
  display: none;
  position: relative;
  z-index: 1;
  min-height: 100vh;
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
}
.screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

/* ===== HOME SCREEN ===== */
#home {
  text-align: center;
  gap: 20px;
}
#home h1 {
  font-size: 3em;
  color: var(--yellow);
  text-shadow: 3px 3px 0 var(--blue), 6px 6px 0 rgba(0,0,0,0.3);
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}
#home .subtitle {
  font-size: 1.2em;
  color: var(--pink);
  margin-bottom: 10px;
}
#home .desc {
  color: #bbb;
  font-size: 0.95em;
  max-width: 500px;
  line-height: 1.8;
}
#home .start-btn {
  background: linear-gradient(135deg, var(--yellow), #FFA500);
  border: none;
  color: var(--dark);
  font-size: 1.5em;
  font-weight: 900;
  padding: 18px 60px;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 8px 30px rgba(252,224,41,0.3);
  font-family: inherit;
  margin-top: 20px;
}
#home .start-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 12px 40px rgba(252,224,41,0.5);
}

/* ===== QUESTION SCREEN ===== */
#question {
  gap: 20px;
  justify-content: flex-start;
  padding-top: 60px;
}
.progress-bar {
  width: 100%;
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--yellow), var(--pink));
  border-radius: 10px;
  transition: width 0.5s ease;
}
.q-counter {
  font-size: 0.9em;
  color: #888;
  align-self: flex-start;
  margin-bottom: 5px;
}
.q-text {
  font-size: 1.6em;
  font-weight: 700;
  text-align: center;
  color: #fff;
  margin: 20px 0;
  line-height: 1.5;
  animation: fadeInUp 0.5s ease;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.options {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 600px;
  margin-top: 10px;
}
.option-btn {
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.12);
  color: #eee;
  padding: 16px 24px;
  border-radius: 16px;
  font-size: 1.05em;
  cursor: pointer;
  transition: all 0.3s;
  text-align: left;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 12px;
  animation: fadeInUp 0.5s ease backwards;
}
.option-btn .opt-label {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  font-weight: 700;
  font-size: 0.85em;
  flex-shrink: 0;
}
.option-btn:hover {
  background: rgba(252,224,41,0.15);
  border-color: var(--yellow);
  transform: translateX(5px);
}
.option-btn:active {
  transform: scale(0.98);
}
.option-btn:focus,
.option-btn:focus-visible {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.12);
  outline: none;
}

/* ===== RESULT SCREEN ===== */
#result {
  gap: 20px;
  padding-top: 40px;
  text-align: center;
}
.rarity-badge {
  font-size: 0.9em;
  padding: 6px 20px;
  border-radius: 30px;
  font-weight: 900;
  letter-spacing: 2px;
  display: inline-block;
  margin-bottom: 10px;
}

/* SSR */
.rarity-SSR {
  background: linear-gradient(135deg, #FFD700, #FFA500);
  color: #1a1a2e;
  box-shadow: 0 0 30px rgba(255,215,0,0.6);
  animation: goldGlow 2s ease-in-out infinite;
}
@keyframes goldGlow {
  0%,100% { box-shadow: 0 0 20px rgba(255,215,0,0.4); }
  50% { box-shadow: 0 0 50px rgba(255,215,0,0.9), 0 0 80px rgba(255,215,0,0.3); }
}

/* SR */
.rarity-SR {
  background: linear-gradient(135deg, #C084FC, #8B5CF6);
  color: #fff;
  box-shadow: 0 0 20px rgba(192,132,252,0.4);
}

/* R */
.rarity-R {
  background: linear-gradient(135deg, #60A5FA, #3B82F6);
  color: #fff;
}

/* N */
.rarity-N {
  background: linear-gradient(135deg, #9CA3AF, #6B7280);
  color: #fff;
}

/* C */
.rarity-C {
  background: linear-gradient(135deg, #A8A29E, #78716C);
  color: #1a1a2e;
}

/* D */
.rarity-D {
  background: #2d2d2d;
  color: #666;
  border: 1px solid #444;
  text-shadow: none;
}

.result-icon {
  font-size: 5em;
  margin: 15px 0;
  animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}
.result-name {
  font-size: 2.2em;
  font-weight: 900;
  color: var(--yellow);
  line-height: 1.3;
}
.result-desc {
  font-size: 1em;
  color: #ccc;
  max-width: 600px;
  line-height: 1.8;
  margin: 10px auto;
  padding: 0 15px;
}
.result-section {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 18px 24px;
  width: 100%;
  max-width: 600px;
  text-align: left;
  margin: 5px 0;
}
.result-section h3 {
  font-size: 0.9em;
  color: var(--pink);
  margin-bottom: 8px;
  font-weight: 700;
}
.result-section p {
  font-size: 0.95em;
  color: #bbb;
  line-height: 1.7;
}

/* SSR Gold Screen Effect */
.ssr-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 999;
  display: none;
}
.ssr-overlay.active {
  display: block;
  background: radial-gradient(ellipse at center, rgba(255,215,0,0.15) 0%, transparent 70%);
  animation: pulseGold 2s ease-in-out infinite;
}
@keyframes pulseGold {
  0%,100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* D-grade cracked effect */
.result-D .result-card-main {
  border: 1px solid #333;
  filter: grayscale(0.3);
  position: relative;
}
.result-D .result-card-main::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 4px,
    rgba(0,0,0,0.03) 4px,
    rgba(0,0,0,0.03) 8px
  );
  pointer-events: none;
  border-radius: 16px;
}

/* ===== SHARE CARD ===== */
#share-card {
  width: 400px;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
  margin: 10px 0;
}
#share-card.gold-border {
  border: 3px solid var(--gold);
  box-shadow: 0 0 40px rgba(255,215,0,0.3);
  background: linear-gradient(135deg, #1a1a2e, #2a1a0e);
}
#share-card.dark-border {
  border: 2px solid #333;
  background: #1a1a1a;
}
#share-card.normal-border {
  border: 2px solid rgba(255,255,255,0.15);
  background: linear-gradient(135deg, #1a1a2e, #1e2a3e);
}

.share-card-icon { font-size: 4em; margin-bottom: 10px; }
.share-card-title { font-size: 0.8em; color: #888; margin-bottom: 5px; }
.share-card-name { font-size: 1.8em; font-weight: 900; color: var(--yellow); margin-bottom: 5px; }
.share-card-rarity { font-size: 0.9em; margin-bottom: 15px; }
.share-card-tagline { font-size: 0.9em; color: #aaa; line-height: 1.6; }
.share-card-footer { font-size: 0.7em; color: #555; margin-top: 20px; }

.actions {
  display: flex;
  gap: 12px;
  margin: 20px 0;
  flex-wrap: wrap;
  justify-content: center;
}
.action-btn {
  padding: 12px 30px;
  border-radius: 30px;
  border: none;
  font-size: 1em;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  font-family: inherit;
}
.action-btn.retry {
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.2);
}
.action-btn.retry:hover { background: rgba(255,255,255,0.2); }
.action-btn.share {
  background: linear-gradient(135deg, var(--yellow), #FFA500);
  color: var(--dark);
}
.action-btn.share:hover { transform: scale(1.05); }

/* ===== RESPONSIVE ===== */
@media (max-width: 500px) {
  #home h1 { font-size: 2.2em; }
  .q-text { font-size: 1.2em; }
  .result-name { font-size: 1.6em; }
  #share-card { width: 100%; max-width: 360px; }
  .option-btn { padding: 14px 18px; font-size: 0.95em; }
}

/* ===== CONFETTI ===== */
.confetti-piece {
  position: fixed;
  width: 10px;
  height: 10px;
  top: -10px;
  z-index: 1000;
  pointer-events: none;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>

<div class="bubble-bg" id="bubbleBg"></div>
<div class="ssr-overlay" id="ssrOverlay"></div>

<!-- ===== HOME ===== -->
<div class="screen active" id="home">
  <h1>🧽</h1>
  <h1>测测你是<br>海绵宝宝里的谁</h1>
  <p class="subtitle">✨ 比奇堡命运鉴定书 ✨</p>
  <p class="desc">
    12道日常灵魂拷问，揭开你在比奇堡的真实身份。<br>
    ⚠️ 温馨提示：大部分人测出来都不是主角。<br>
    可能是路过的鱼，可能是某个道具，甚至可能是……海水。
  </p>
  <button class="start-btn" onclick="startTest()">🔮 开始测试</button>
</div>

<!-- ===== QUESTION ===== -->
<div class="screen" id="question">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="q-counter" id="qCounter"></div>
  <div class="q-text" id="qText"></div>
  <div class="options" id="options"></div>
</div>

<!-- ===== RESULT ===== -->
<div class="screen" id="result">
  <div class="rarity-badge" id="rarityBadge"></div>
  <div class="result-icon" id="resultIcon"></div>
  <div class="result-name" id="resultName"></div>
  <div class="result-desc" id="resultDesc"></div>

  <div class="result-section" id="dailyLife">
    <h3>🏠 你在比奇堡的日常一天</h3>
    <p id="dailyText"></p>
  </div>
  <div class="result-section">
    <h3>👻 你最害怕遇到的角色</h3>
    <p id="fearText"></p>
  </div>
  <div class="result-section">
    <h3>🤝 唯一理解你的角色</h3>
    <p id="allyText"></p>
  </div>
  <div class="result-section">
    <h3>💰 你的比奇堡身价评估</h3>
    <p id="valueText"></p>
  </div>

  <div style="margin-top:10px;width:100%;max-width:600px;" id="shareCardContainer"></div>

  <div class="actions">
    <button class="action-btn share" onclick="captureShare()">📸 生成分享卡片</button>
    <button class="action-btn retry" onclick="startTest()">🔄 再来一次</button>
  </div>
</div>

<script>
// ===== BUBBLES =====
(function createBubbles() {
  const bg = document.getElementById('bubbleBg');
  for (let i = 0; i < 25; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 20 + Math.random() * 80;
    b.style.width = size + 'px';
    b.style.height = size + 'px';
    b.style.left = Math.random() * 100 + '%';
    b.style.animationDuration = (12 + Math.random() * 18) + 's';
    b.style.animationDelay = (Math.random() * 20) + 's';
    bg.appendChild(b);
  }
})();

// ===== DATA =====

  {
    text: "你走进一个陌生的房间，下意识第一个注意到什么？",

      { label: "A", text: "出口在哪里（生存本能启动）", weights: { fred: 3, water: 2, menu: 2 } },
      { label: "B", text: "谁在看我（被迫害妄想发作）", weights: { squidward: 2, mrsPuff: 3, selfPortrait: 3 } },
      { label: "C", text: "有没有吃的", weights: { spongebob: 1, krabs: 2, patrick: 1 } },

      { label: "D", text: "反手冤枉回去", weights: { krabs: 2, bubbleBass: 3, iReady: 2 } }
    ]
  },
  {

      { label: "A", text: "「微波炉叮的一声」", weights: { iReady: 2, menu: 2, spongebob: 1 } },

    desc: "你是比奇堡的海水——你无处不在，但没人意识到你的存在。没有你一切都会死，但从来没有人感谢过水。你是终极工具人。你托举着每一栋建筑，承载着每一条鱼，包容着每一次灾难性的车祸。你流经蟹老板的铜板，也流过海绵宝宝的眼泪。你什么都见证过，什么都没说过。你只是存在着。",
    daily: "早上被海绵宝宝泼了一身（他在洗脸）。你流进蟹堡王的排水管，经过厨房，看到章鱼哥在耍帅，你裹走了一点油污。中午你蒸发了一点，变成云，飘到珊迪的圆顶上面看了一眼。下午你落下，成为雨水，砸在Fred的腿上——他大喊「My Leg！」你有点愧疚但也不完全是你的错。晚上你在比奇堡的边缘，平静地起伏着。你看了一整天的戏。你明天还要再看一遍。你无所谓。你是水。",
    fear: "被海绵宝宝装进瓶子里。不是因为危险，而是因为他会对着你说话一整天。",
    ally: "所有鱼。他们都在你里面。但这是一种单向的关系——他们不知道你在。你也不想让他们知道。",
    value: "比奇堡的房价全靠你撑着。具体价格？你是海水，不值钱，但没你不行。经典工具人悖论。"
  }
};

// Weighted result selection
function getWeightedResult(scores) {
  // Ensure all base results have some weight
  const allKeys = Object.keys(results);
  const minWeight = 0.0001;

  // Build scores from question answers
  let totalWeights = {};
  allKeys.forEach(k => { totalWeights[k] = minWeight; });

  for (const [key, weight] of Object.entries(scores)) {
    if (totalWeights[key] !== undefined) {
      totalWeights[key] += weight;
    }
  }

  // Weight distribution designed for ~80% getting N/C/D results
  // SSR: spongebob, patrick -> ~1% each
  // SR: squidward, krabs -> ~5% each
  // R: gary, sandy -> ~15% each
  // N: fred, mrsPuff, oldMan -> ~25% each
  // C: firstDollar, selfPortrait, menu, patrickRock, iReady -> ~8% each
  // D: water -> ~3%

  // Apply rarity multipliers to tilt distribution
  const rarityMultipliers = {
    spongebob: 1, patrick: 1,
    squidward: 5, krabs: 5,
    gary: 15, sandy: 15,
    fred: 30, mrsPuff: 25, oldMan: 22,
    firstDollar: 8, selfPortrait: 8, menu: 8, patrickRock: 6, iReady: 6,
    water: 3
  };

  for (const key of allKeys) {
    totalWeights[key] *= (rarityMultipliers[key] || 1);
  }

  // Rolling
  const entries = Object.entries(totalWeights);
  const total = entries.reduce((s, [,v]) => s + v, 0);
  let r = Math.random() * total;
  for (const [key, weight] of entries) {
    r -= weight;
    if (r <= 0) return key;
  }
  return entries[entries.length-1][0];
}

// ===== TEST LOGIC =====
let currentQ = 0;
let scores = {};

function startTest() {
  document.activeElement?.blur();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('question').classList.add('active');
  currentQ = 0;
  scores = {};
  showQuestion();
}

function showQuestion() {
  if (currentQ >= questions.length) {
    showResult();
    return;
  }

  const q = questions[currentQ];
  document.getElementById('progressFill').style.width = ((currentQ) / questions.length * 100) + '%';
  document.getElementById('qCounter').textContent = `第 ${currentQ + 1} / ${questions.length} 题`;
  document.getElementById('qText').textContent = q.text;

  const container = document.getElementById('options');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.style.animationDelay = (i * 0.1) + 's';
    btn.innerHTML = `<span class="opt-label">${opt.label}</span>${opt.text}`;
    btn.onclick = () => {
      document.activeElement?.blur();
      // Add weights to scores
      for (const [key, w] of Object.entries(opt.weights)) {
        scores[key] = (scores[key] || 0) + w;
      }
      currentQ++;
      showQuestion();
    };
    container.appendChild(btn);
  });
}

function showResult() {
  const key = getWeightedResult(scores);
  const r = results[key];

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const rs = document.getElementById('result');
  rs.classList.add('active');

  // Apply rarity class
  rs.className = 'screen active';
  if (r.rarity === 'D') rs.classList.add('result-D');

  // SSR overlay / confetti
  const overlay = document.getElementById('ssrOverlay');
  overlay.classList.remove('active');
  if (r.rarity === 'SSR') {
    overlay.classList.add('active');
    launchConfetti();
  }

  document.getElementById('rarityBadge').className = 'rarity-badge rarity-' + r.rarity;
  document.getElementById('rarityBadge').textContent = r.rarityLabel;
  document.getElementById('resultIcon').textContent = r.icon;
  document.getElementById('resultName').textContent = r.name;
  document.getElementById('resultDesc').textContent = r.desc;
  document.getElementById('dailyText').textContent = r.daily;
  document.getElementById('fearText').textContent = r.fear;
  document.getElementById('allyText').textContent = r.ally;
  document.getElementById('valueText').textContent = r.value;

  // Build share card
  buildShareCard(r, key);

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function buildShareCard(r) {
  const container = document.getElementById('shareCardContainer');
  let borderClass = 'normal-border';
  if (r.rarity === 'SSR') borderClass = 'gold-border';
  else if (r.rarity === 'D') borderClass = 'dark-border';

  container.innerHTML = `
    <div id="share-card" class="${borderClass}">
      <div class="share-card-icon">${r.icon}</div>
      <div class="share-card-title">我在比奇堡的真实身份是——</div>
      <div class="share-card-name">${r.name}</div>
      <div class="share-card-rarity rarity-badge rarity-${r.rarity}">${r.rarityLabel}</div>
      <div class="share-card-tagline">"${r.desc.split('。')[0]}。${r.desc.split('。')[1] || ''}"</div>
      <div class="share-card-footer">🧽 测测你是海绵宝宝里的谁 · 长按保存分享</div>
    </div>
  `;
}

function captureShare() {
  // Use html2canvas if available, otherwise use built-in approach
  alert('📸 长按上面的卡片图片即可保存分享！如果您的浏览器不支持，您可以截屏保存。');
}

function launchConfetti() {
  const colors = ['#FFD700', '#FF6347', '#00CED1', '#FF69B4', '#7B68EE', '#FFA500', '#32CD32'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDuration = (2 + Math.random() * 3) + 's';
    piece.style.animationDelay = Math.random() * 2 + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 6000);
  }
}
